<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Category | BookAndRead</title>
  <meta name="description" content="Browse our collection of digital study resources.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #fff; color: #000; }
    .container { max-width: 1280px; margin: 20px auto; padding: 0 20px; }
    .back-link { color: #000; text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 20px; }
    .category-header { margin-bottom: 30px; }
    .category-header h1 { font-size: 2rem; margin-bottom: 10px; }
    .book-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
    .product-card { background: #fff; border: 1px solid #eee; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; height: 100%; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 6px 12px rgba(0,0,0,0.05); }
    .product-img { aspect-ratio: 3/4; background: #fafafa; display: flex; align-items: center; justify-content: center; padding: 8px; border-bottom: 1px solid #f0f0f0; }
    .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .product-info { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
    .popularity-mini { font-size: 0.6rem; color: #0066cc; margin-bottom: 4px; }
    .product-title { font-size: 0.75rem; font-weight: 500; line-height: 1.3; margin-bottom: 8px; flex-grow: 1; }
    .btn-view { margin-top: auto; }
    .btn-view img { width: 100%; max-width: 130px; height: auto; cursor: pointer; }
    .error { text-align: center; padding: 50px; color: #666; }
    @media (max-width: 768px) { .book-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Back to Home</a>
    <div id="content"></div>
  </div>

  <script src="js/products.js"></script>
  <script>
    (function() {
      const content = document.getElementById('content');
      const pageTitle = document.getElementById('pageTitle');
      
      if (typeof PRODUCTS === 'undefined') {
        content.innerHTML = '<div class="error">❌ Error: Product data not found.</div>';
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const category = params.get('cat');
      
      if (!category) {
        content.innerHTML = '<div class="error">📁 No category selected. <a href="index.html">Return home</a>.</div>';
        return;
      }

      const filtered = PRODUCTS.filter(p => p.category === category);
      
      if (filtered.length === 0) {
        content.innerHTML = `<div class="error">📚 No books found in "${category}". <a href="index.html">Browse all categories</a>.</div>`;
        return;
      }

      pageTitle.textContent = `${category} | BookAndRead`;
      
      let html = `<div class="category-header"><h1>${category}</h1><p>${filtered.length} books available</p></div><div class="book-grid">`;
      
      filtered.forEach(book => {
        const miniHotness = Math.floor(Math.random() * 41) + 35;
        const priceFormatted = book.price.replace(',', '.');
        html += `
          <a href="product.html?id=${book.id}" class="product-card">
            <div class="product-img">
              <img src="images/books/${book.image}" alt="${book.title}" loading="lazy" onerror="this.src='https://placehold.co/400x500?text=Cover'">
            </div>
            <div class="product-info">
              <div class="popularity-mini">🔥 ${miniHotness} views</div>
              <div class="product-title">${book.title}</div>
              <div class="btn-view">
                <img src="images/buttons/btn-${priceFormatted}.png" alt="Get Book" onerror="this.src='images/buttons/btn-9.99.png'">
              </div>
            </div>
          </a>
        `;
      });
      
      html += '</div>';
      content.innerHTML = html;
    })();
  </script>
</body>
</html>
