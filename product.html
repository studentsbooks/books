<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Book Details | BookAndRead</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#f9f9f9; color:#1a1a1a; }
    .page-wrapper { max-width:1280px; margin:0 auto; padding:20px; }
    
    .back-btn { display:inline-block; background:#000; color:#fff; text-decoration:none; padding:10px 20px; border-radius:4px; font-weight:500; margin-bottom:24px; }
    .back-btn:hover { background:#333; }
    
    .product-main { background:#fff; border-radius:16px; padding:40px; display:flex; flex-wrap:wrap; gap:40px; margin-bottom:40px; }
    .product-gallery { flex:1 1 300px; text-align:center; }
    .product-gallery img { max-width:100%; max-height:500px; object-fit:contain; }
    .product-details { flex:1 1 400px; }
    .product-details h1 { font-size:2rem; margin-bottom:10px; }
    .product-author { font-size:1.1rem; color:#555; margin-bottom:20px; }
    .product-meta { display:flex; flex-wrap:wrap; gap:20px; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid #eee; }
    .meta-item { display:flex; align-items:center; gap:8px; color:#666; }
    .popularity-badge { background:#f0f7ff; color:#0066cc; padding:8px 16px; border-radius:30px; display:inline-block; margin-bottom:20px; }
    .product-description { margin-bottom:24px; }
    .purchase-section img { max-width:220px; height:auto; cursor:pointer; }
    .recommendations { margin-top:40px; }
    .book-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; }
    .book-card { background:#fff; border-radius:12px; overflow:hidden; text-decoration:none; color:inherit; display:flex; flex-direction:column; height:100%; }
    .book-card:hover { transform:translateY(-4px); box-shadow:0 12px 24px rgba(0,0,0,0.08); }
    .book-card-img { aspect-ratio:3/4; background:#fafafa; display:flex; align-items:center; justify-content:center; padding:12px; }
    .book-card-img img { max-width:100%; max-height:100%; object-fit:contain; }
    .book-card-info { padding:12px; flex-grow:1; display:flex; flex-direction:column; }
    .book-card-title { font-size:0.85rem; font-weight:500; margin-bottom:8px; flex-grow:1; }
    .book-card-btn { margin-top:auto; text-align:center; }
    .book-card-btn img { max-width:100%; height:auto; display:inline-block; }
    @media (max-width:768px) { .book-grid { grid-template-columns:repeat(2, 1fr); } }
  </style>
</head>
<body>
<div class="page-wrapper">
  <a href="index.html" class="back-btn">← Back to Books</a>
  <div id="productContent"></div>
  <div id="recommendationsContent" class="recommendations"></div>
</div>
<script src="js/products.js"></script>
<script>
  (function() {
    const productContainer = document.getElementById('productContent');
    const recContainer = document.getElementById('recommendationsContent');
    const pageTitle = document.getElementById('pageTitle');
    if (typeof PRODUCTS === 'undefined') return;
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    if (!id) return;
    const book = PRODUCTS.find(p => p.id === id);
    if (!book) return;

    pageTitle.textContent = book.title + ' | BookAndRead';
    const hotness = Math.floor(Math.random() * 41) + 35;
    const isbn = book.isbn || book.ISBN || '';
    const year = book.year || book.Year || '';
    const priceFormatted = book.price.replace(',', '.');
    
    let metaHTML = `<div class="meta-item">📚 Category: ${book.category}</div>`;
    if (isbn) metaHTML += `<div class="meta-item">🔖 ISBN: ${isbn}</div>`;
    if (year) metaHTML += `<div class="meta-item">📅 Year: ${year}</div>`;
    metaHTML += `<div class="meta-item">💻 Type: Digital Access</div>`;

    const encodedUrl = btoa(book.fourthwall_url);

    productContainer.innerHTML = `
      <div class="product-main">
        <div class="product-gallery"><img src="images/books/${book.image}" onerror="this.src='https://placehold.co/600x800?text=Cover'"></div>
        <div class="product-details">
          <h1>${book.title}</h1>
          <div class="product-author">by ${book.author}</div>
          <div class="product-meta">${metaHTML}</div>
          <div class="popularity-badge">🔥 ${hotness} people accessed this book recently</div>
          <div class="product-description"><p>${book.description}</p></div>
          <div class="purchase-section">
            <a href="#" data-encoded-url="${encodedUrl}" class="purchase-link">
              <img src="images/buttons/btn-${priceFormatted}.png" onerror="this.src='images/buttons/btn-9.99.png'">
            </a>
          </div>
        </div>
      </div>
    `;

    document.querySelector('.purchase-link').addEventListener('click', (e) => {
      e.preventDefault();
      const encoded = e.currentTarget.dataset.encodedUrl;
      window.open(atob(encoded), '_blank');
    });

    // You May Also Like
    const sameCategory = PRODUCTS.filter(p => p.category === book.category && p.id !== book.id);
    const recommended = sameCategory.sort(() => 0.5 - Math.random()).slice(0, 4);
    if (recommended.length) {
      let recHTML = '<h2>You May Also Like</h2><div class="book-grid">';
      recommended.forEach(rec => {
        const recPrice = rec.price.replace(',', '.');
        recHTML += `<a href="product.html?id=${rec.id}" class="book-card"><div class="book-card-img"><img src="images/books/${rec.image}" loading="lazy" onerror="this.src='https://placehold.co/400x500?text=Cover'"></div><div class="book-card-info"><div class="book-card-title">${rec.title}</div><div class="book-card-btn"><img src="images/buttons/btn-${recPrice}.png" onerror="this.src='images/buttons/btn-9.99.png'"></div></div></a>`;
      });
      recHTML += '</div>';
      recContainer.innerHTML = recHTML;
    }
  })();
</script>
</body>
</html>
