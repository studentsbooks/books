<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Book Details | BookAndRead</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#f9f9f9; color:#1a1a1a; line-height:1.5; }
    .page-wrapper { max-width:1280px; margin:0 auto; padding:20px; }
    .nav-back { margin-bottom:24px; }
    .nav-back a { color:#1a1a1a; text-decoration:none; font-weight:500; }
    .product-main { background:#fff; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,0.05); padding:40px; display:flex; flex-wrap:wrap; gap:40px; margin-bottom:40px; }
    .product-gallery { flex:1 1 300px; display:flex; flex-direction:column; align-items:center; }
    .product-gallery img { max-width:100%; max-height:500px; object-fit:contain; border-radius:8px; }
    .product-details { flex:1 1 400px; }
    .product-details h1 { font-size:2rem; font-weight:700; margin-bottom:12px; }
    .product-author { font-size:1.1rem; color:#555; margin-bottom:16px; }
    .product-meta { display:flex; flex-wrap:wrap; gap:16px 24px; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid #eee; }
    .meta-item { display:flex; align-items:center; gap:8px; font-size:0.9rem; color:#666; }
    .popularity-badge { background:#f0f7ff; color:#0066cc; padding:8px 16px; border-radius:30px; font-weight:500; display:inline-block; margin-bottom:20px; }
    .product-description { margin-bottom:24px; color:#333; }
    .price-section { margin-bottom:24px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .current-price { font-size:2.5rem; font-weight:700; }
    .btn-purchase { display:flex; align-items:center; gap:16px; }
    .btn-purchase img { max-width:200px; height:auto; cursor:pointer; }
    .digital-badge-img { width:120px; height:auto; }
    .recommendations { margin-top:40px; }
    .recommendations h2 { font-size:1.8rem; margin-bottom:24px; }
    .book-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; }
    .book-card { background:#fff; border-radius:12px; overflow:hidden; text-decoration:none; color:inherit; transition:transform 0.2s; display:flex; flex-direction:column; height:100%; }
    .book-card:hover { transform:translateY(-4px); box-shadow:0 12px 24px rgba(0,0,0,0.08); }
    .book-card-img { aspect-ratio:3/4; background:#fafafa; display:flex; align-items:center; justify-content:center; padding:12px; }
    .book-card-img img { max-width:100%; max-height:100%; object-fit:contain; }
    .book-card-info { padding:12px; flex-grow:1; display:flex; flex-direction:column; }
    .book-card-title { font-size:0.85rem; font-weight:500; line-height:1.3; margin-bottom:8px; flex-grow:1; }
    .book-card-btn { background:#1a1a1a; color:#fff; text-align:center; padding:8px; border-radius:6px; font-size:0.8rem; text-decoration:none; display:block; margin-top:auto; }
    .book-card-btn:hover { background:#333; }
    .order-toast { position:fixed; bottom:20px; left:20px; background:#1a1a1a; color:#fff; padding:16px 24px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.2); z-index:1000; display:flex; align-items:center; gap:12px; max-width:350px; animation:slideIn 0.4s; }
    .order-toast img { width:40px; height:40px; border-radius:50%; object-fit:cover; background:#333; }
    .order-toast-content p { margin:0; font-size:0.9rem; }
    .order-toast-content small { color:#aaa; font-size:0.75rem; }
    @keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
    @media (max-width:768px) {
      .product-main { padding:24px; }
      .book-grid { grid-template-columns:repeat(2, 1fr); }
      .price-section { flex-direction:column; align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="nav-back"><a href="index.html">← Back to Books</a></div>
    <div id="productContent"></div>
    <div id="recommendationsContent" class="recommendations"></div>
  </div>

  <template id="orderToastTemplate">
    <div class="order-toast">
      <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="customer">
      <div class="order-toast-content">
        <p><span id="toastMessage"></span></p>
        <small>just now</small>
      </div>
    </div>
  </template>

  <script src="js/products.js"></script>
  <script>
    (function() {
      const productContainer = document.getElementById('productContent');
      const recContainer = document.getElementById('recommendationsContent');
      const pageTitle = document.getElementById('pageTitle');
      
      if (typeof PRODUCTS === 'undefined') return;
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));
      if (!id) return;
      const book = PRODUCTS.find(p => p.id === id);
      if (!book) return;

      const hotness = Math.floor(Math.random() * 41) + 35;
      pageTitle.textContent = `${book.title} | BookAndRead`;
      
      const isbn = book.isbn || book.ISBN || 'N/A';
      const year = book.year || book.Year || 'N/A';
      const priceFormatted = book.price.replace(',', '.');
      
      productContainer.innerHTML = `
        <div class="product-main">
          <div class="product-gallery">
            <img src="images/books/${book.image}" alt="${book.title}" onerror="this.src='https://placehold.co/600x800?text=Cover'">
            <img src="images/digital-badge.png" alt="Digital Access" class="digital-badge-img" style="margin-top:16px;">
          </div>
          <div class="product-details">
            <h1>${book.title}</h1>
            <div class="product-author">by ${book.author}</div>
            <div class="product-meta">
              <div class="meta-item">📚 Category: ${book.category}</div>
              <div class="meta-item">🔖 ISBN: ${isbn}</div>
              <div class="meta-item">📅 Year: ${year}</div>
              <div class="meta-item">💻 Type: Digital Access</div>
            </div>
            <div class="popularity-badge">🔥 ${hotness} people accessed this book recently</div>
            <div class="product-description"><p>${book.description}</p></div>
            <div class="price-section">
              <span class="current-price">$${book.price}</span>
              <a href="${book.fourthwall_url}" target="_blank" class="btn-purchase">
                <img src="images/buttons/btn-${priceFormatted}.png" alt="Get Book" style="max-width:200px; height:auto;" onerror="this.src='images/buttons/btn-9.99.png'">
              </a>
            </div>
          </div>
        </div>
      `;
      
      // You May Also Like
      const sameCategory = PRODUCTS.filter(p => p.category === book.category && p.id !== book.id);
      const recommended = sameCategory.sort(() => 0.5 - Math.random()).slice(0, 4);
      if (recommended.length) {
        let recHTML = '<h2>You May Also Like</h2><div class="book-grid">';
        recommended.forEach(rec => {
          const recPrice = rec.price.replace(',', '.');
          recHTML += `
            <a href="product.html?id=${rec.id}" class="book-card">
              <div class="book-card-img">
                <img src="images/books/${rec.image}" alt="${rec.title}" loading="lazy" onerror="this.src='https://placehold.co/400x500?text=Cover'">
              </div>
              <div class="book-card-info">
                <div class="book-card-title">${rec.title}</div>
                <img src="images/buttons/btn-${recPrice}.png" alt="Get Book" style="width:100%; max-width:120px; height:auto; margin-top:auto;" onerror="this.src='images/buttons/btn-9.99.png'">
              </div>
            </a>
          `;
        });
        recHTML += '</div>';
        recContainer.innerHTML = recHTML;
      }

      // Sahte Sipariş Bildirimi
      const names = ["James", "Emma", "Michael", "Sophia", "William", "Olivia", "Alexander", "Isabella", "Daniel", "Mia"];
      const cities = ["New York", "Los Angeles", "London", "Sydney", "Toronto", "Chicago", "Houston", "Phoenix", "Melbourne", "Manchester"];
      const countries = ["USA", "UK", "Canada", "Australia"];
      
      function showOrderToast() {
        const template = document.getElementById('orderToastTemplate');
        if (!template) return;
        const clone = template.content.cloneNode(true);
        const toastMessage = clone.querySelector('#toastMessage');
        const randomName = names[Math.floor(Math.random() * names.length)];
        const randomCity = cities[Math.floor(Math.random() * cities.length)];
        const randomCountry = countries[Math.floor(Math.random() * countries.length)];
        const sameCatBooks = PRODUCTS.filter(p => p.category === book.category);
        const randomBook = sameCatBooks[Math.floor(Math.random() * sameCatBooks.length)] || book;
        toastMessage.textContent = `${randomName} from ${randomCity}, ${randomCountry} purchased "${randomBook.title.substring(0, 40)}..."`;
        document.body.appendChild(clone);
        setTimeout(() => { const toast = document.querySelector('.order-toast'); if (toast) toast.remove(); }, 5000);
      }
      
      setTimeout(() => { showOrderToast(); }, 2000 + Math.random() * 2000);
      setInterval(() => { showOrderToast(); }, 15000 + Math.random() * 10000);
    })();
  </script>
</body>
</html>
