<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search | BookAndRead</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter', sans-serif; background:#fff; margin:0; }
    .container { max-width:1280px; margin:20px auto; padding:0 20px; }
    .back-link { color:#000; text-decoration:none; }
    .search-box { width:100%; padding:16px; font-size:1.2rem; border:1px solid #ddd; border-radius:8px; margin:20px 0; }
    .results-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:16px; }
    .product-card { border:1px solid #eee; text-decoration:none; color:inherit; display:flex; flex-direction:column; }
    .product-img { aspect-ratio:3/4; background:#fafafa; display:flex; align-items:center; justify-content:center; padding:8px; }
    .product-img img { max-width:100%; max-height:100%; object-fit:contain; }
    .product-info { padding:10px; }
    .product-title { font-size:0.8rem; margin-bottom:8px; }
    .btn-view img { max-width:120px; }
    @media (max-width:768px) { .results-grid { grid-template-columns:repeat(2, 1fr); } }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← Back to Home</a>
  <input type="text" id="searchInput" class="search-box" placeholder="Search by title, author, or ISBN...">
  <div id="resultsContainer" class="results-grid"></div>
</div>
<script src="js/products.js"></script>
<script>
  const input = document.getElementById('searchInput');
  const resultsDiv = document.getElementById('resultsContainer');
  const products = typeof PRODUCTS !== 'undefined' ? PRODUCTS : [];
  
  function renderResults(query) {
    if (!query) { resultsDiv.innerHTML = ''; return; }
    const q = query.toLowerCase();
    const filtered = products.filter(p => 
      p.title.toLowerCase().includes(q) || 
      (p.author && p.author.toLowerCase().includes(q)) ||
      (p.isbn && p.isbn.includes(q))
    );
    if (filtered.length === 0) {
      resultsDiv.innerHTML = '<p>No books found.</p>';
      return;
    }
    let html = '';
    filtered.forEach(book => {
      const priceFormatted = book.price.replace(',', '.');
      html += `<a href="product.html?id=${book.id}" class="product-card"><div class="product-img"><img src="images/books/${book.image}" loading="lazy" onerror="this.src='https://placehold.co/400x500?text=Cover'"></div><div class="product-info"><div class="product-title">${book.title}</div><div class="btn-view"><img src="images/buttons/btn-${priceFormatted}.png" onerror="this.src='images/buttons/btn-9.99.png'"></div></div></a>`;
    });
    resultsDiv.innerHTML = html;
  }
  
  input.addEventListener('input', (e) => renderResults(e.target.value));
</script>
</body>
</html>
