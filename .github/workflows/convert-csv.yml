name: Convert CSV to JS

on:
  push:
    paths:
      - 'products.csv'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Convert CSV to JS
        run: |
          npm install -g csvtojson
          csvtojson products.csv > temp.json
          node -e "const data=require('./temp.json'); const fs=require('fs'); fs.writeFileSync('js/products.js', 'const PRODUCTS = ' + JSON.stringify(data, null, 2) + ';');"
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add js/products.js
          git commit -m "Auto-update products.js from CSV" || echo "No changes"
          git push
